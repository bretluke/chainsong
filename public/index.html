<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chainsong</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800;12..96,900&family=Spline+Sans+Mono:wght@400;500;600&display=swap');

  :root{
    --bg:#0b0917; --bg-2:#0e0b1c;
    --panel:#141026; --panel-2:#1a1530;
    --input:#1c1735;
    --ink:#f4f0ff; --dim:#a099c0; --dimmer:#6a6288;
    --hot:#ff5d73; --lime:#c2f970; --violet:#9b6dff; --spot:#1db954;
    --line:#26203f; --line-2:#332a52;
    --header-h:34px;
    --history-h:52px;
    --hero-h:96px;
    --save-h:40px;
    --player-h:120px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow-x:hidden}
  body{
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(155,109,255,.20), transparent 60%),
      radial-gradient(800px 500px at -10% 110%, rgba(255,93,115,.13), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:'Bricolage Grotesque',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    min-height:100vh;
  }
  body.has-player{padding-bottom:var(--player-h)}

  .wrap{max-width:640px;margin:0 auto;padding:10px 14px 14px;
    display:flex;flex-direction:column;gap:8px}

  header{display:flex;align-items:center;gap:10px;height:var(--header-h)}
  .brand{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .brand svg.logo{width:32px;height:19px;flex:0 0 auto}
  .brand .name{font-size:17px;font-weight:900;letter-spacing:.4px;
    text-transform:uppercase;font-style:italic;line-height:1}
  .brand .name .x{color:var(--hot)}
  .turn{font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--dim);
    text-transform:uppercase;letter-spacing:1.5px;flex:1;text-align:left;padding-left:6px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spot-inline{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .spot-inline .dot{width:8px;height:8px;border-radius:50%;background:var(--dimmer)}
  .spot-inline.on .dot{background:var(--spot);box-shadow:0 0 8px rgba(29,185,84,.6)}
  .spot-inline .who{font-size:13px;font-weight:600;max-width:120px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  .spot-inline .badge{background:rgba(155,109,255,.18);color:var(--violet);
    font-family:'Spline Sans Mono',monospace;font-size:9px;letter-spacing:1px;
    padding:3px 6px;border-radius:5px;font-weight:600}
  .spot-inline button{background:transparent;border:1px solid var(--line-2);color:var(--ink);
    padding:6px 10px;border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer;
    display:inline-flex;align-items:center;gap:5px;font-weight:500}
  .spot-inline button svg{width:12px;height:12px}
  .spot-inline button.primary{background:var(--spot);border-color:var(--spot);color:#000;font-weight:700}

  .history{display:flex;gap:6px;overflow-x:auto;height:var(--history-h);
    align-items:center;scrollbar-width:none;padding:2px 0}
  .history::-webkit-scrollbar{display:none}
  .hcard{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:9px;
    padding:6px 9px;min-width:130px;max-width:180px;display:flex;gap:7px;align-items:center;height:44px;
    cursor:pointer;transition:background .15s, border-color .15s}
  .hcard:hover{background:var(--panel-2);border-color:var(--line-2)}
  .hcard.current{border-color:var(--violet);background:rgba(155,109,255,.08)}
  .hcard.current:hover{background:rgba(155,109,255,.14);border-color:var(--violet)}
  .hcard.playing{border-color:var(--lime);background:rgba(194,249,112,.06)}
  .hcard.playing:hover{background:rgba(194,249,112,.10)}
  .hcard img{width:30px;height:30px;border-radius:4px;object-fit:cover;flex:0 0 auto;background:#0e0b1a}
  .hcard .hbody{min-width:0;flex:1}
  .hcard .hseq{font-family:'Spline Sans Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.8px;line-height:1}
  .hcard.playing .hseq{color:var(--lime)}
  .hcard .htitle{font-size:11px;font-weight:700;line-height:1.2;margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hcard .hartist{font-size:10px;color:var(--dim);line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hlink{flex:0 0 auto;color:var(--dim);opacity:.6;display:flex;align-items:center}
  .hlink svg{width:16px;height:16px}
  .hempty{color:var(--dim);font-family:'Spline Sans Mono',monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:1.5px;padding:8px 4px}

  .prev{background:linear-gradient(140deg, rgba(155,109,255,.16) 0%, rgba(155,109,255,.05) 45%, rgba(255,93,115,.06) 100%);
    border:1px solid rgba(155,109,255,.32);border-radius:14px;padding:12px 14px;
    display:flex;gap:12px;align-items:center;min-height:var(--hero-h)}
  .prev.empty{background:var(--panel);border-color:var(--line);text-align:center;padding:16px;display:block;min-height:auto}
  .prev img{width:72px;height:72px;border-radius:8px;object-fit:cover;flex:0 0 auto;box-shadow:0 4px 14px rgba(0,0,0,.45)}
  .prev .pbody{flex:1;min-width:0}
  .prev .plabel{font-family:'Spline Sans Mono',monospace;font-size:9px;color:var(--violet);
    text-transform:uppercase;letter-spacing:2px;margin-bottom:2px;font-weight:500}
  .prev .ptitle{font-size:20px;font-weight:800;line-height:1.1;letter-spacing:-.4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prev .partist{font-size:12px;color:var(--dim);margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prev .pforbid{margin-top:6px;display:inline-flex;align-items:center;gap:6px;
    font-family:'Spline Sans Mono',monospace;font-size:9px;color:#ff97a6;
    text-transform:uppercase;letter-spacing:1.2px}
  .prev .pforbid b{background:rgba(255,93,115,.20);padding:2px 6px;border-radius:5px;
    font-family:'Bricolage Grotesque',sans-serif;text-transform:none;font-size:11px;color:#ff97a6;font-weight:600;letter-spacing:0}
  .prev.empty .ptitle{font-size:14px;font-weight:600;color:var(--dim);letter-spacing:0}
  .prev .pctrl{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .prev .pctrl button,.prev .pctrl a{
    display:inline-flex;align-items:center;gap:5px;
    padding:6px 10px;border-radius:8px;
    font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;
    text-decoration:none;border:1px solid var(--line-2);
    background:rgba(255,255,255,.04);color:var(--ink);transition:.15s}
  .prev .pctrl button svg,.prev .pctrl a svg{width:12px;height:12px}
  .prev .pctrl button.play{border-color:var(--lime);color:var(--lime);background:transparent}
  .prev .pctrl button.full{border-color:var(--lime);color:var(--lime);background:transparent}
  .prev .pctrl button.full.playing{background:rgba(194,249,112,.12)}
  .prev .pctrl a.spot{background:var(--spot);border-color:var(--spot);color:#000;font-weight:700}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
  .field{display:flex;gap:10px;padding:8px 0;align-items:center}
  .field+.field{border-top:1px solid var(--line)}
  .field .ficon{width:20px;color:var(--dim);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .field .ficon svg{width:18px;height:18px}
  .field .fbody{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .flabel{font-family:'Spline Sans Mono',monospace;font-size:9px;text-transform:uppercase;
    letter-spacing:1.2px;color:var(--dim);font-weight:500;line-height:1}
  input.txt{width:100%;background:transparent;border:none;color:var(--ink);
    font-family:inherit;font-size:15px;padding:2px 0;outline:none;line-height:1.2}
  input.txt::placeholder{color:rgba(160,153,192,.45)}
  input.txt:focus{color:#fff}
  .hint{font-size:10px;color:var(--dim);line-height:1.3}

  .words{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
  .w{font-family:'Spline Sans Mono',monospace;font-size:11px;padding:5px 9px;border-radius:7px;
    background:rgba(255,255,255,.04);border:1px solid var(--line-2);color:var(--ink);cursor:pointer;transition:.15s;line-height:1}
  .w:hover{border-color:var(--violet)}
  .w.sel{background:var(--lime);color:#101010;border-color:var(--lime);font-weight:700}
  .w.dead{opacity:.28;cursor:not-allowed;text-decoration:line-through}
  .w.dead:hover{border-color:var(--line-2)}
  /* Fallback words (pronouns) shown when primary options are dead — slightly
     dimmer border so they read as "opened up because you were stuck". */
  .w.fallback{border-style:dashed}

  button.go{width:100%;margin-top:10px;background:transparent;color:var(--dimmer);
    border:1px solid var(--line-2);
    font-family:inherit;font-weight:600;font-size:14px;padding:11px 14px;border-radius:10px;cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;transition:.15s}
  button.go:not(:disabled){background:var(--hot);border-color:var(--hot);color:#fff;font-weight:700}
  button.go svg{width:16px;height:16px;opacity:.9}
  button.go:disabled svg{opacity:.4}
  button.go:not(:disabled):active{transform:scale(.99)}

  .msg{margin-top:8px;font-size:12px;padding:8px 11px;border-radius:8px;display:none;line-height:1.4}
  .msg.err{display:block;background:rgba(255,93,115,.12);color:#ff97a6;border:1px solid rgba(255,93,115,.3)}
  .msg.ok{display:block;background:rgba(194,249,112,.1);color:var(--lime);border:1px solid rgba(194,249,112,.3)}
  .msg.info{display:block;background:rgba(155,109,255,.12);color:var(--violet);border:1px solid rgba(155,109,255,.3)}

  .savebtn{width:100%;background:var(--lime);color:#101010;border:none;font-family:inherit;font-weight:700;
    font-size:13px;padding:10px;border-radius:10px;cursor:pointer;display:none;
    align-items:center;justify-content:center;gap:8px;height:var(--save-h)}
  .savebtn.show{display:flex}
  .savebtn svg{width:15px;height:15px}
  .savebtn:disabled{opacity:.6;cursor:wait}

  .player{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--bg-2);
    border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    display:none;flex-direction:column;gap:6px;
    z-index:100;
    height:calc(var(--player-h) + env(safe-area-inset-bottom))
  }
  .player.show{display:flex}
  .player-inner{max-width:640px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:6px}

  .pl-top{display:flex;align-items:center;gap:10px}
  .pl-art{width:44px;height:44px;border-radius:6px;object-fit:cover;flex:0 0 auto;background:#0e0b1a;
    display:flex;align-items:center;justify-content:center;color:var(--dimmer)}
  .pl-art svg{width:20px;height:20px}
  .pl-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
  .pl-title{font-size:13px;font-weight:700;line-height:1.15;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl-artist{font-size:11px;color:var(--dim);line-height:1.15;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl-nowplaying{align-self:flex-start;display:none;align-items:center;gap:4px;
    font-family:'Spline Sans Mono',monospace;font-size:8px;color:var(--lime);
    background:rgba(194,249,112,.12);padding:2px 6px;border-radius:4px;
    text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-top:2px}
  .pl-nowplaying.show{display:inline-flex}
  .pl-nowplaying svg{width:9px;height:9px}
  .pl-close{background:transparent;border:none;color:var(--dim);cursor:pointer;padding:4px;
    display:flex;align-items:center;justify-content:center}
  .pl-close svg{width:16px;height:16px}
  .pl-close:hover{color:var(--ink)}
  .pl-close:disabled{opacity:.3;cursor:not-allowed}

  .pl-mid{display:flex;align-items:center;gap:10px}
  .pl-controls{display:flex;align-items:center;gap:10px;flex:0 0 auto}
  .pl-controls button{background:transparent;border:none;color:var(--dim);
    cursor:pointer;padding:4px;border-radius:6px;transition:.15s;
    display:inline-flex;align-items:center;justify-content:center}
  .pl-controls button svg{width:16px;height:16px}
  .pl-controls button:hover:not(:disabled){color:var(--ink)}
  .pl-controls button:disabled{opacity:.25;cursor:not-allowed}
  .pl-controls button.toggle.on{color:var(--lime)}
  .pl-controls .pl-play{background:var(--ink);color:var(--bg);width:34px;height:34px;border-radius:50%;padding:0}
  .pl-controls .pl-play svg{width:14px;height:14px}
  .pl-controls .pl-play:hover:not(:disabled){background:var(--lime);color:var(--bg)}
  .pl-controls .pl-play:disabled{background:var(--line-2);color:var(--dimmer);opacity:1}

  .pl-seekwrap{flex:1;min-width:0;display:flex;align-items:center;gap:8px;
    font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--dim)}
  .pl-time,.pl-total{min-width:30px}
  .pl-total{text-align:right}
  input[type=range].pl-seek{
    flex:1;height:4px;-webkit-appearance:none;appearance:none;
    background:linear-gradient(to right, var(--lime) 0%, var(--lime) var(--pct,0%), var(--line-2) var(--pct,0%), var(--line-2) 100%);
    border-radius:2px;outline:none;padding:0;border:none;cursor:pointer}
  input[type=range].pl-seek:disabled{opacity:.5;cursor:not-allowed}
  input[type=range].pl-seek::-webkit-slider-thumb{
    -webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--ink);cursor:pointer;border:none}
  input[type=range].pl-seek::-moz-range-thumb{
    width:11px;height:11px;border-radius:50%;background:var(--ink);cursor:pointer;border:none}

  .pl-volwrap{display:flex;align-items:center;gap:6px;flex:0 0 auto;max-width:110px}
  .pl-volicon{color:var(--dim);display:inline-flex}
  .pl-volicon svg{width:14px;height:14px}
  input[type=range].pl-vol{
    flex:1;height:3px;-webkit-appearance:none;appearance:none;
    background:linear-gradient(to right, var(--lime) 0%, var(--lime) var(--vpct,60%), var(--line-2) var(--vpct,60%), var(--line-2) 100%);
    border-radius:2px;outline:none;padding:0;border:none;cursor:pointer;width:70px}
  input[type=range].pl-vol::-webkit-slider-thumb{
    -webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--ink);cursor:pointer;border:none}
  input[type=range].pl-vol::-moz-range-thumb{
    width:10px;height:10px;border-radius:50%;background:var(--ink);cursor:pointer;border:none}

  @media (max-width:480px){
    .wrap{padding:8px 12px 12px;gap:7px}
    .brand .name{font-size:15px}
    .brand svg.logo{width:28px;height:17px}
    .spot-inline .who{max-width:90px;font-size:12px}
    .prev{padding:10px 12px;gap:10px}
    .prev img{width:60px;height:60px}
    .prev .ptitle{font-size:17px}
    .prev .partist{font-size:11px}
    .panel{padding:10px 12px}
    .field{padding:6px 0}
    input.txt{font-size:14px}
    button.go{padding:10px 12px;font-size:13px}
    .pl-volwrap{display:none}
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="brandg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c2f970"/>
      <stop offset="55%" stop-color="#9b6dff"/>
      <stop offset="100%" stop-color="#ff5d73"/>
    </linearGradient>
    <symbol id="i-brand" viewBox="0 0 42 24">
      <path d="M12 12a6 6 0 100 .1M30 12a6 6 0 100 .1M14 12h14" stroke="url(#brandg)" stroke-width="3" stroke-linecap="round" fill="none"/>
    </symbol>
    <symbol id="i-chain" viewBox="0 0 24 24">
      <path d="M10 14l-2 2a4 4 0 01-6-6l3-3a4 4 0 016 0M14 10l2-2a4 4 0 016 6l-3 3a4 4 0 01-6 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="i-user" viewBox="0 0 24 24">
      <path d="M16 8a4 4 0 11-8 0 4 4 0 018 0zM4 20c0-4 4-6 8-6s8 2 8 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    </symbol>
    <symbol id="i-music" viewBox="0 0 24 24">
      <path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
    </symbol>
    <symbol id="i-pencil" viewBox="0 0 24 24">
      <path d="M15 5l4 4L8 20H4v-4L15 5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="i-link" viewBox="0 0 24 24">
      <path d="M10 14a4 4 0 010-6l3-3a4 4 0 016 6l-2 2M14 10a4 4 0 010 6l-3 3a4 4 0 01-6-6l2-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="i-play" viewBox="0 0 24 24"><path d="M7 4v16l14-8z" fill="currentColor"/></symbol>
    <symbol id="i-pause" viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z" fill="currentColor"/></symbol>
    <symbol id="i-prev" viewBox="0 0 24 24"><path d="M7 5h2v14H7zM20 5v14l-11-7z" fill="currentColor"/></symbol>
    <symbol id="i-next" viewBox="0 0 24 24"><path d="M15 5h2v14h-2zM4 5v14l11-7z" fill="currentColor"/></symbol>
    <symbol id="i-shuffle" viewBox="0 0 24 24">
      <path d="M16 3l5 4-5 4M16 21l5-4-5-4M3 7h4l10 10h4M17 7h4M3 17h4l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="i-repeat" viewBox="0 0 24 24">
      <path d="M17 2l4 4-4 4M7 22l-4-4 4-4M3 6h14a4 4 0 014 4v4M21 18H7a4 4 0 01-4-4v-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="i-vol" viewBox="0 0 24 24">
      <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor"/>
      <path d="M15 9a4 4 0 010 6M18 6a8 8 0 010 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    </symbol>
    <symbol id="i-close" viewBox="0 0 24 24">
      <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-signout" viewBox="0 0 24 24">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="i-spot" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="currentColor"/>
      <path d="M7.5 15.5c2-1 5-1.5 8 0M6.5 12c2.5-1 6-1.5 10 0M6 9c3-1 7.5-1.5 12 0" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-menu" viewBox="0 0 24 24">
      <path d="M4 6h16M4 12h10M4 18h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    </symbol>
    <symbol id="i-eq" viewBox="0 0 24 24">
      <rect x="4" y="10" width="3" height="10" rx="1" fill="currentColor"/>
      <rect x="10.5" y="6" width="3" height="14" rx="1" fill="currentColor"/>
      <rect x="17" y="12" width="3" height="8" rx="1" fill="currentColor"/>
    </symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24">
      <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="i-note-alt" viewBox="0 0 24 24">
      <path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.6" fill="none"/>
      <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.6" fill="none"/>
    </symbol>
  </defs>
</svg>

<div class="wrap">
  <header>
    <div class="brand">
      <svg class="logo"><use href="#i-brand"/></svg>
      <span class="name">Chain<span class="x">song</span></span>
    </div>
    <span class="turn" id="turn">Opening move</span>

<audio id="audio" preload="auto"></audio>
<script src="https://sdk.scdn.co/spotify-player.js"></script>

<script>
// ---- word logic — MUST stay in sync with lib/wordlink.js on the server ----
// HARD stop words: never valid link words. SOFT stop words (pronouns) are
// normally filtered but the picker promotes them to fallback options when
// the primary set has no viable moves — this unblocks pronoun-heavy titles
// like "Me, Myself and I" or "You and I" that would otherwise dead-end.
const HARD=new Set(["a","an","the","of","to","in","on","at","by","for","with","from","as","is","be","am","are","was","were","been","and","or","but","nor","so","yet","if","then","than","that","this","these","those","up","out","off","over","into","onto","down","no","not","do","does","did","n"]);
const SOFT=new Set(["i","me","my","mine","myself","you","your","yours","u","he","him","his","she","her","hers","it","its","we","us","our","ours","they","them","their","theirs"]);
const STOP=new Set([...HARD,...SOFT]);
function rawTokens(t){if(!t)return[];return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[\u0027\u2018\u2019\u02BC]/g,"").replace(/\b([a-z](?:\.[a-z])+)\.?/g,m=>m.replace(/\./g,"")).replace(/[^a-z0-9 ]+/g," ").split(/\s+/).filter(Boolean);}
const IRR={children:"child",men:"man",women:"woman",people:"person",feet:"foot",teeth:"tooth",ran:"run",running:"run",runs:"run",loved:"love",loving:"love",loves:"love",rushed:"rush",rushing:"rush",rushes:"rush",always:"always",perhaps:"perhaps",across:"across"};
function stem(w){if(IRR[w])return IRR[w];if(w.length<=3)return w;
 if(w.endsWith("ies")&&w.length>4)return w.slice(0,-3)+"y";
 if(w.endsWith("ied")&&w.length>4)return w.slice(0,-3)+"y";
 if(w.endsWith("es")&&w.length>4&&/(s|x|z|ch|sh)es$/.test(w))return w.slice(0,-2);
 if(w.endsWith("ing")&&w.length>5){let b=w.slice(0,-3);if(/([bdfgklmnprt])\1$/.test(b))b=b.slice(0,-1);return b;}
 if(w.endsWith("ed")&&w.length>4){let b=w.slice(0,-2);if(/([bdfgklmnprt])\1$/.test(b))b=b.slice(0,-1);return b;}
 if(w.endsWith("iest")&&w.length>5)return w.slice(0,-4)+"y";
 if(w.endsWith("ier")&&w.length>4)return w.slice(0,-3)+"y";
 if(w.endsWith("est")&&w.length>5)return w.slice(0,-3);
 if(w.endsWith("er")&&w.length>4)return w.slice(0,-2);
 if(w.endsWith("ly")&&w.length>4)return w.slice(0,-2);
 if(w.endsWith("s")&&!/(ss|us|is|os|as)$/.test(w)&&w.length>3)return w.slice(0,-1);
 return w;}
function _extract(title,artist,stopSet){const seen=new Set(),out=[];for(const s of[title,artist])for(const tk of rawTokens(s)){if(stopSet.has(tk)||tk.length<2)continue;const st=stem(tk);if(stopSet.has(st)||seen.has(st))continue;seen.add(st);out.push({display:tk,stem:st});}return out;}
function linkable(title,artist){return _extract(title,artist,STOP);}
function linkableFallback(title,artist){return _extract(title,artist,HARD);}

// ---- state ----
const chain=[];
let forbiddenStem=null, selected=null, spotifyUser=null;
let sdkPlayer=null, sdkDeviceId=null, sdkReady=false, sdkPlaying=false, sdkCurrentUri=null;
let posReported=0, posReportedAt=0, posDuration=0;
let posTicker=null, userDraggingSeek=false;
let shuffleOn=false, repeatOn=false, advancing=false;

const $=id=>document.getElementById(id);
const titleEl=$("title"),artistEl=$("artist"),descEl=$("desc");
const audio=$("audio");
const esc=s=>String(s).replace(/[&<>"]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[x]));

async function loadSpotifyUser(){
  try{ const r=await fetch('/api/spotify-me'); spotifyUser=await r.json(); }
  catch(e){ spotifyUser={loggedIn:false}; }
  renderSpotifyBar();
  initWebPlaybackSDK();
}
function renderSpotifyBar(){
  const bar=$("spotbar"),who=$("spotwho"),badge=$("spotbadge"),btn=$("spotbtn");
  if(spotifyUser?.loggedIn){
    bar.classList.add('on');
    who.style.display='inline'; who.textContent=spotifyUser.displayName;
    badge.style.display=spotifyUser.product==='premium'?'inline-block':'none';
    btn.innerHTML='<svg><use href="#i-signout"/></svg>';
    btn.classList.remove('primary'); btn.title='Sign out';
    btn.onclick=async()=>{
      await fetch('/api/spotify-logout',{method:'POST'});
      if(sdkPlayer){ try{ sdkPlayer.disconnect(); }catch(e){} sdkPlayer=null; sdkReady=false; sdkDeviceId=null; }
      sdkPlaying=false; sdkCurrentUri=null;
      spotifyUser={loggedIn:false};
      renderSpotifyBar(); updateSaveButton(); renderChain(); renderPlayer();
    };
  }else{
    bar.classList.remove('on');
    who.style.display='none'; badge.style.display='none';
    btn.innerHTML='<svg><use href="#i-spot"/></svg><span>Connect</span>';
    btn.classList.add('primary'); btn.title='Connect Spotify';
    btn.onclick=()=>{ location.href='/api/spotify-login'; };
  }
  updateSaveButton();
}

function initWebPlaybackSDK(){
  if(!spotifyUser?.loggedIn || spotifyUser.product!=='premium') return;
  if(sdkPlayer) return;
  const buildPlayer=()=>{
    sdkPlayer=new Spotify.Player({
      name:'Chainsong', volume:0.6,
      getOAuthToken:async(cb)=>{
        try{ const r=await fetch('/api/spotify-me'); const d=await r.json(); if(d.loggedIn) cb(d.accessToken); }
        catch(e){ console.error('SDK token fetch failed',e); }
      },
    });
    sdkPlayer.addListener('ready',({device_id})=>{
      sdkDeviceId=device_id; sdkReady=true;
      renderChain(); renderPlayer();
      const last=chain[chain.length-1];
      if(last?.spotify?.uri && !sdkCurrentUri) playFullTrack(last.spotify.uri);
    });
    sdkPlayer.addListener('not_ready',()=>{ sdkReady=false; renderChain(); renderPlayer(); });
    sdkPlayer.addListener('player_state_changed',(state)=>{
      if(!state){ sdkPlaying=false; renderChain(); renderPlayer(); return; }
      const wasPlaying=sdkPlaying;
      sdkPlaying=!state.paused;
      const uri=state.track_window?.current_track?.uri;
      if(uri) sdkCurrentUri=uri;
      posReported=state.position; posReportedAt=Date.now(); posDuration=state.duration||0;
      if(wasPlaying && state.paused && state.position===0) handleTrackEnded();
      renderChain(); renderPlayer();
    });
    sdkPlayer.addListener('initialization_error',e=>console.error('sdk init:',e));
    sdkPlayer.addListener('authentication_error',e=>console.error('sdk auth:',e));
    sdkPlayer.addListener('account_error',e=>{ console.error('sdk needs Premium:',e); sdkReady=false; renderChain(); renderPlayer(); });
    sdkPlayer.connect();
  };
  if(window.Spotify){ buildPlayer(); }
  else { window.onSpotifyWebPlaybackSDKReady=buildPlayer; }
}

async function playFullTrack(uri){
  if(!sdkReady || !sdkDeviceId) return;
  audio.pause();
  try{
    if(sdkCurrentUri===uri && sdkPlaying){ await sdkPlayer.pause(); return; }
    if(sdkCurrentUri===uri && !sdkPlaying){ await sdkPlayer.resume(); return; }
    const me=await(await fetch('/api/spotify-me')).json();
    if(!me.loggedIn) return;
    await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${sdkDeviceId}`,{
      method:'PUT',
      headers:{ Authorization:`Bearer ${me.accessToken}`, 'Content-Type':'application/json' },
      body:JSON.stringify({ uris:[uri] }),
    });
    sdkCurrentUri=uri;
    renderPlayer();
  }catch(e){ console.error('play failed',e); }
}

function playerChainIndex(){ if(!sdkCurrentUri) return -1; return chain.findIndex(c=>c.spotify?.uri===sdkCurrentUri); }
function currentPosition(){
  if(!sdkPlaying) return posReported;
  return Math.min(posReported + (Date.now()-posReportedAt), posDuration||0);
}
function fmtTime(ms){ if(!ms||ms<0) ms=0; const s=Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function updatePosDisplay(){
  const pos=currentPosition();
  $("pl-time").textContent=fmtTime(pos);
  const seek=$("pl-seek");
  if(!userDraggingSeek){
    const pct=posDuration?(pos/posDuration)*1000:0;
    seek.value=pct;
    seek.style.setProperty('--pct',`${(pct/10).toFixed(1)}%`);
  }
}
function ensureTicker(){
  if(posTicker) return;
  posTicker=setInterval(()=>{ if(sdkReady && sdkPlaying) updatePosDisplay(); },250);
}
function renderPlayer(){
  const bar=$("player");
  if(!sdkReady){
    bar.classList.remove('show');
    document.body.classList.remove('has-player');
    return;
  }
  bar.classList.add('show');
  document.body.classList.add('has-player');

  const idx=playerChainIndex();
  const track=idx>=0?chain[idx]:null;
  const artWrap=$("pl-art-wrap");

  if(track){
    $("pl-title").textContent=track.title||'Playing…';
    $("pl-artist").textContent=track.artist||'';
    const art=track.spotify?.albumArt;
    if(art){
      artWrap.innerHTML=`<img src="${esc(art)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:6px">`;
    } else {
      artWrap.innerHTML='<svg><use href="#i-note-alt"/></svg>';
    }
    $("pl-nowplaying").classList.add('show');
    $("pl-close").disabled=false;
  } else {
    $("pl-title").textContent='Ready to play';
    $("pl-artist").textContent=chain.length?'Tap Play full on any song':'Name a song to begin';
    artWrap.innerHTML='<svg><use href="#i-note-alt"/></svg>';
    $("pl-nowplaying").classList.remove('show');
    $("pl-close").disabled=true;
  }

  $("pl-playicon").innerHTML=`<use href="#${sdkPlaying?'i-pause':'i-play'}"/>`;
  const playableCount=chain.filter(c=>c.spotify?.uri).length;
  $("pl-play").disabled=!track && playableCount===0;
  const canGo=playableCount>1;
  $("pl-prev").disabled=!canGo || (!track) || (idx<=0 && !repeatOn && !shuffleOn);
  $("pl-next").disabled=!canGo || (!track) || (idx>=chain.length-1 && !repeatOn && !shuffleOn);
  $("pl-shuffle").classList.toggle('on',shuffleOn);
  $("pl-repeat").classList.toggle('on',repeatOn);
  $("pl-total").textContent=fmtTime(posDuration);
  $("pl-seek").disabled=!track;
  updatePosDisplay();
  ensureTicker();
}
function pickAdjacent(dir){
  const playable=chain.map((c,i)=>({i,uri:c.spotify?.uri})).filter(x=>x.uri);
  if(!playable.length) return null;
  const idx=playerChainIndex();
  if(shuffleOn){
    const others=playable.filter(x=>x.i!==idx);
    if(!others.length) return null;
    return others[Math.floor(Math.random()*others.length)].uri;
  }
  const currentPos=playable.findIndex(x=>x.i===idx);
  let nextPos=currentPos+dir;
  if(nextPos<0) nextPos = repeatOn ? playable.length-1 : -1;
  if(nextPos>=playable.length) nextPos = repeatOn ? 0 : -1;
  return nextPos>=0 ? playable[nextPos].uri : null;
}
async function handleTrackEnded(){
  if(advancing) return;
  advancing=true;
  try{
    const uri=pickAdjacent(1);
    if(uri) await playFullTrack(uri);
  } finally { setTimeout(()=>{advancing=false;},400); }
}

$("pl-play").onclick=async()=>{
  if(!sdkPlayer) return;
  if(!sdkCurrentUri){
    const last=chain[chain.length-1];
    if(last?.spotify?.uri) playFullTrack(last.spotify.uri);
    return;
  }
  try{ sdkPlaying ? await sdkPlayer.pause() : await sdkPlayer.resume(); } catch(e){ console.error(e); }
};
$("pl-prev").onclick=()=>{ const u=pickAdjacent(-1); if(u) playFullTrack(u); };
$("pl-next").onclick=()=>{ const u=pickAdjacent(1); if(u) playFullTrack(u); };
$("pl-shuffle").onclick=()=>{ shuffleOn=!shuffleOn; renderPlayer(); };
$("pl-repeat").onclick=()=>{ repeatOn=!repeatOn; renderPlayer(); };
$("pl-close").onclick=async()=>{
  if(sdkPlayer){ try{ await sdkPlayer.pause(); }catch(e){} }
  sdkCurrentUri=null; sdkPlaying=false;
  posReported=0; posDuration=0;
  renderPlayer(); renderChain();
};

const seek=$("pl-seek");
seek.addEventListener('mousedown',()=>userDraggingSeek=true);
seek.addEventListener('touchstart',()=>userDraggingSeek=true,{passive:true});
seek.addEventListener('input',()=>{
  if(!posDuration) return;
  const ms=(parseFloat(seek.value)/1000)*posDuration;
  $("pl-time").textContent=fmtTime(ms);
  seek.style.setProperty('--pct',`${(parseFloat(seek.value)/10).toFixed(1)}%`);
});
async function commitSeek(){
  userDraggingSeek=false;
  if(!sdkPlayer || !posDuration) return;
  const ms=Math.floor((parseFloat(seek.value)/1000)*posDuration);
  try{ await sdkPlayer.seek(ms); posReported=ms; posReportedAt=Date.now(); }
  catch(e){ console.error('seek failed',e); }
}
seek.addEventListener('mouseup',commitSeek);
seek.addEventListener('touchend',commitSeek);
seek.addEventListener('change',commitSeek);
const vol=$("pl-vol");
vol.addEventListener('input',()=>{
  vol.style.setProperty('--vpct',`${vol.value}%`);
  if(!sdkPlayer) return;
  try{ sdkPlayer.setVolume(parseFloat(vol.value)/100); }catch(e){}
});
vol.style.setProperty('--vpct','60%');

$("history").addEventListener('click', e=>{
  const card=e.target.closest('.hcard');
  if(!card) return;
  const i=parseInt(card.dataset.i,10);
  if(isNaN(i)) return;
  const m=chain[i];
  if(m?.spotify?.uri && sdkReady) playFullTrack(m.spotify.uri);
});

function renderChain(){
  const hist=$("history");
  if(!chain.length){
    hist.innerHTML='<span class="hempty">no songs yet</span>';
  } else {
    hist.innerHTML=chain.map((m,i)=>{
      const img=m.spotify?.albumArt?`<img src="${esc(m.spotify.albumArt)}" alt="">`:'<div style="width:30px;height:30px;border-radius:4px;background:#0e0b1a;flex:0 0 auto"></div>';
      const isCurrent=i===chain.length-1;
      const isPlaying=sdkCurrentUri && m.spotify?.uri===sdkCurrentUri;
      const linkMark=m.linkWord?` · ${esc(m.linkWord)}`:'';
      const linkIcon=i<chain.length-1?`<span class="hlink"><svg><use href="#i-chain"/></svg></span>`:'';
      const cls=['hcard'];
      if(isCurrent) cls.push('current');
      if(isPlaying) cls.push('playing');
      return `<div class="${cls.join(' ')}" data-i="${i}" title="Play this song">
        ${img}<div class="hbody">
          <div class="hseq">#${String(i+1).padStart(2,'0')}${linkMark}</div>
          <div class="htitle">${esc(m.title)}</div>
          <div class="hartist">${esc(m.artist)}</div>
        </div>
      </div>${linkIcon}`;
    }).join('');
    hist.scrollLeft=hist.scrollWidth;
  }

  const prev=$("prev");
  if(!chain.length){
    prev.className='prev empty';
    prev.innerHTML='<div class="ptitle">Name any song to start the chain</div>';
    return;
  }
  const last=chain[chain.length-1];
  let forbidDisplay=null;
  if(forbiddenStem){
    // Use fallback set — the forbidden word may be a pronoun promoted from
    // an earlier fallback move, so look through everything.
    const w=linkableFallback(last.title,last.artist).find(x=>x.stem===forbiddenStem);
    forbidDisplay=w?w.display:null;
  }
  const art=last.spotify?.albumArt?`<img src="${esc(last.spotify.albumArt)}" alt="">`:'';
  const hasPreview=!!last.spotify?.previewUrl;
  const openLink=last.spotify?.externalUrl;
  const canFull=sdkReady && !!last.spotify?.uri;
  const fullIsThis=sdkCurrentUri===last.spotify?.uri && sdkPlaying;
  prev.className='prev';
  prev.innerHTML=`${art}<div class="pbody">
    <div class="plabel">Link your song to</div>
    <div class="ptitle">${esc(last.title)}</div>
    <div class="partist">${esc(last.artist)}</div>
    ${forbidDisplay?`<div class="pforbid">CANNOT REUSE <b>${esc(forbidDisplay)}</b></div>`:''}
    <div class="pctrl">
      ${hasPreview?`<button class="play" id="playbtn"><svg><use href="#i-play"/></svg>Preview</button>`:''}
      ${canFull?`<button class="full ${fullIsThis?'playing':''}" id="fullbtn"><svg><use href="#i-eq"/></svg>${fullIsThis?'Playing':'Play full'}</button>`:''}
      ${openLink?`<a class="spot" href="${esc(openLink)}" target="_blank" rel="noopener"><svg><use href="#i-spot"/></svg>Spotify</a>`:''}
    </div>
  </div>`;
  const pb=$("playbtn"); if(pb) pb.onclick=()=>togglePreview(last.spotify.previewUrl,pb);
  const fb=$("fullbtn"); if(fb) fb.onclick=()=>playFullTrack(last.spotify.uri);
}

function togglePreview(url,btn){
  if(audio.src===url && !audio.paused){
    audio.pause(); btn.innerHTML='<svg><use href="#i-play"/></svg>Preview'; return;
  }
  if(sdkPlaying && sdkPlayer){ try{ sdkPlayer.pause(); }catch(e){} }
  audio.src=url;
  audio.play().then(()=>{ btn.innerHTML='<svg><use href="#i-pause"/></svg>Playing'; })
    .catch(()=>{ btn.innerHTML='<svg><use href="#i-play"/></svg>Preview'; });
}
audio.addEventListener('ended',()=>{
  const pb=$("playbtn"); if(pb) pb.innerHTML='<svg><use href="#i-play"/></svg>Preview';
});

function autoPlayLatest(){
  const last=chain[chain.length-1];
  if(!last?.spotify) return;
  if(sdkReady && last.spotify.uri){
    if(!sdkCurrentUri) playFullTrack(last.spotify.uri);
    return;
  }
  if(!last.spotify.previewUrl || !audio.paused) return;
  audio.src=last.spotify.previewUrl;
  audio.play().then(()=>{
    const pb=$("playbtn"); if(pb) pb.innerHTML='<svg><use href="#i-pause"/></svg>Playing';
  }).catch(()=>{});
}

// Compute link-word options with a fallback tier for dead-ends.
//
// Primary set = words filtered by both HARD and SOFT (no pronouns).
// If every primary word would be dead (forbidden or absent from the song
// the player is currently naming), we ALSO show the pronouns from the
// fallback set so the game isn't soft-locked. Fallback words render with
// a dashed border so they read as "opened up because you were stuck".
function refreshWords(){
  const isOpening=chain.length===0;
  $("linkField").style.display=isOpening?'none':'flex';
  $("turn").textContent=isOpening?'Opening move':`Player ${(chain.length%4)+1}'s turn`;
  $("goText").textContent=isOpening?'Start the chain':'Name this song';
  if(isOpening){validate();return;}

  const last=chain[chain.length-1];
  const primary=linkable(last.title,last.artist);
  const userTyped=!!(titleEl.value.trim() || artistEl.value.trim());
  // Use fallback set for the "in new song" check so pronouns in the new
  // song count as matches when we're in fallback mode.
  const nextStems=new Set(linkableFallback(titleEl.value,artistEl.value).map(w=>w.stem));

  // A word is "viable" if the player could actually pick it right now.
  const isViable=w=>{
    if(w.stem===forbiddenStem) return false;
    if(userTyped && !nextStems.has(w.stem)) return false;
    return true;
  };

  // Decide whether to expand to fallback tier.
  const primaryViable=primary.some(isViable);
  let words=primary;
  const fallbackStems=new Set();
  if(!primaryViable){
    const primaryStems=new Set(primary.map(w=>w.stem));
    const extras=linkableFallback(last.title,last.artist)
                   .filter(w=>!primaryStems.has(w.stem));
    for(const w of extras) fallbackStems.add(w.stem);
    words=[...primary,...extras];
  }

  // If the currently-selected word is no longer viable, unselect silently.
  if(selected && !words.some(w=>w.stem===selected.stem && isViable(w))){
    selected=null;
  }

  $("words").innerHTML=words.map(w=>{
    const forbidden=w.stem===forbiddenStem;
    const notInNew=userTyped && !nextStems.has(w.stem);
    const dead=forbidden||notInNew;
    const sel=selected&&selected.stem===w.stem;
    const isFallback=fallbackStems.has(w.stem);
    const t=forbidden?'used to link into this song':(notInNew?'not in your song':(isFallback?'fallback — normally filtered':''));
    const cls=['w'];
    if(dead) cls.push('dead');
    if(sel) cls.push('sel');
    if(isFallback) cls.push('fallback');
    return `<span class="${cls.join(' ')}" data-s="${w.stem}" data-d="${esc(w.display)}"${t?` title="${t}"`:''}>${esc(w.display)}</span>`;
  }).join('');
  validate();
}
$("words").addEventListener("click",e=>{
  const el=e.target.closest('.w');if(!el||el.classList.contains('dead'))return;
  selected={display:el.dataset.d,stem:el.dataset.s};refreshWords();
});
[titleEl,artistEl].forEach(el=>el.addEventListener("input",()=>{selected=null;refreshWords();}));
function validate(){
  const hasSong=titleEl.value.trim()&&artistEl.value.trim();
  const ok=chain.length===0?hasSong:(hasSong&&selected);
  $("go").disabled=!ok;
}
function showMsg(t,kind){const m=$("msg");m.textContent=t;m.className="msg "+kind;}
function clearMsg(){$("msg").className="msg";}

async function submit(){
  $("go").disabled=true;clearMsg();
  const isOpening=chain.length===0;
  const prev=isOpening?null:chain[chain.length-1];
  const body={
    prev:prev?{title:prev.title,artist:prev.artist}:null,
    next:{title:titleEl.value.trim(),artist:artistEl.value.trim()},
    linkWord:isOpening?'_':selected.display,
    forbiddenStem
  };
  let data;
  try{
    const r=await fetch('/api/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    data=await r.json();
  }catch(e){ showMsg('Network error — try again.','err'); validate(); return; }

  if(!data.accepted){
    const reasons={
      LINK_NOT_IN_PREVIOUS:"That word isn't in the previous song.",
      LINK_REUSES_FORBIDDEN_WORD:"Can't reuse the word that linked into the last song.",
      LINK_NOT_IN_NEW_SONG:"That word isn't in the song you named.",
      SONG_NOT_FOUND:"Couldn't verify that song exists — check spelling or try a different song.",
      VERIFY_UNAVAILABLE:"Couldn't reach the music database — try again."
    };
    showMsg(reasons[data.reason]||'Move rejected.','err');
    validate();return;
  }

  const wasPlayingSDK   = sdkReady && sdkPlaying;
  const wasPlayingAudio = !audio.paused && audio.src;

  chain.push({
    title:data.canonicalTitle||body.next.title,
    artist:data.canonicalArtist||body.next.artist,
    linkWord:isOpening?null:selected.display,
    linkStem:data.linkStem,override:!!data.override,
    spotify:data.spotify||null
  });
  forbiddenStem=data.linkStem;
  selected=null;titleEl.value='';artistEl.value='';descEl.value='';
  renderChain();refreshWords();updateSaveButton();renderPlayer();
  autoPlayLatest();

  const added=chain[chain.length-1];
  const queued = (wasPlayingSDK && sdkReady && added.spotify?.uri) ||
                 (wasPlayingAudio && !sdkReady && added.spotify?.previewUrl);
  if(queued) showMsg('Queued — plays after this one. Hit Next or tap the card to jump.','info');
  else       showMsg('Linked! Pass the phone.','ok');
  setTimeout(clearMsg,2400);
}

$("go").addEventListener("click",submit);

function updateSaveButton(){
  const btn=$("save");
  const eligible=spotifyUser?.loggedIn && chain.length>=2 &&
                 chain.some(c=>c.spotify?.uri);
  btn.classList.toggle('show',!!eligible);
}
$("save").addEventListener("click",async()=>{
  const btn=$("save"); btn.disabled=true;
  const trackUris=chain.map(c=>c.spotify?.uri).filter(Boolean);
  const name=`Chainsong - ${new Date().toLocaleDateString()}`;
  try{
    const r=await fetch('/api/spotify-playlist',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,trackUris})});
    const data=await r.json();
    if(data.url){
      btn.innerHTML='<svg><use href="#i-menu"/></svg><span>✓ Playlist saved — open</span>';
      btn.onclick=()=>window.open(data.url,'_blank');
    } else {
      btn.innerHTML='<svg><use href="#i-menu"/></svg><span>Save failed — try again</span>';
    }
  }catch(e){ btn.innerHTML='<svg><use href="#i-menu"/></svg><span>Save failed — try again</span>'; }
  btn.disabled=false;
});

const urlParams=new URLSearchParams(location.search);
const spotResult=urlParams.get('spotify');
if(spotResult){
  history.replaceState({},'',location.pathname);
  if(spotResult!=='ok') setTimeout(()=>showMsg("Couldn't connect Spotify. Try again?",'err'),300);
}

loadSpotifyUser();
renderChain();refreshWords();
</script>
</body>
</html>
