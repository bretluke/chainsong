<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chainsong</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Spline+Sans+Mono:wght@400;600&display=swap');

  :root{
    --bg:#0c0a14; --panel:#171327; --ink:#f4f0ff; --dim:#8a82a8;
    --hot:#ff5d73; --lime:#c2f970; --violet:#9b6dff; --line:#2a2440;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(155,109,255,.22), transparent 60%),
      radial-gradient(700px 500px at -10% 110%, rgba(255,93,115,.15), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:'Bricolage Grotesque',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{max-width:540px;margin:0 auto;padding:14px 16px 24px;display:flex;flex-direction:column;gap:12px}

  header{display:flex;align-items:baseline;justify-content:space-between}
  h1{font-size:24px;font-weight:800;letter-spacing:-.5px}
  h1 .x{color:var(--hot)}
  .tag{font-family:'Spline Sans Mono',monospace;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px}

  /* History strip: compact, horizontally scrollable, shows the whole chain
     without eating vertical space needed for the active turn. */
  .history{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .history::-webkit-scrollbar{display:none}
  .hcard{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:8px 11px;min-width:120px;max-width:180px}
  .hcard .hseq{font-family:'Spline Sans Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:1px}
  .hcard .htitle{font-size:12px;font-weight:600;line-height:1.25;margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hcard .hartist{font-size:10px;color:var(--dim);margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* THE previous song — the star of the screen while you're playing. */
  .prev{background:linear-gradient(140deg, rgba(155,109,255,.16), rgba(255,93,115,.10));
    border:1px solid rgba(155,109,255,.35);border-radius:18px;padding:16px 18px;position:relative}
  .prev .plabel{font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--violet);
    text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
  .prev .ptitle{font-size:22px;font-weight:800;line-height:1.15;letter-spacing:-.3px}
  .prev .partist{font-size:14px;color:var(--dim);margin-top:4px}
  .prev .pforbid{margin-top:10px;font-family:'Spline Sans Mono',monospace;font-size:11px;color:#ff97a6}
  .prev .pforbid b{background:rgba(255,93,115,.15);padding:2px 7px;border-radius:5px}

  /* Empty state (before opening move) uses the same slot as .prev */
  .prev.empty{background:var(--panel);border-color:var(--line);text-align:center;padding:22px 18px}
  .prev.empty .ptitle{font-size:16px;font-weight:600;color:var(--dim);letter-spacing:0}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px}
  label{display:block;font-family:'Spline Sans Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin:0 0 6px 2px}
  input{width:100%;background:#0e0b1a;border:1px solid var(--line);color:var(--ink);
    font-family:'Bricolage Grotesque',sans-serif;font-size:16px;padding:12px 14px;border-radius:11px;outline:none}
  input:focus{border-color:var(--violet)}
  input::placeholder{color:#4a4366}
  .row{margin-bottom:11px}
  .hint{font-size:11px;color:var(--dim);margin:5px 2px 0;line-height:1.45}

  .words{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .w{font-family:'Spline Sans Mono',monospace;font-size:13px;padding:8px 12px;border-radius:9px;
    background:#0e0b1a;border:1px solid var(--line);color:var(--ink);cursor:pointer;transition:.15s}
  .w:hover{border-color:var(--violet)}
  .w.sel{background:var(--lime);color:#101010;border-color:var(--lime);font-weight:600}
  .w.dead{opacity:.32;cursor:not-allowed;text-decoration:line-through}
  .w.dead:hover{border-color:var(--line)}

  button.go{width:100%;margin-top:14px;background:var(--hot);color:#fff;border:none;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;padding:14px;border-radius:12px;cursor:pointer;letter-spacing:.3px}
  button.go:disabled{background:#2a2440;color:#5a5278;cursor:not-allowed}
  button.go:not(:disabled):active{transform:scale(.985)}

  .msg{margin-top:11px;font-size:13px;padding:10px 13px;border-radius:10px;display:none;line-height:1.4}
  .msg.err{display:block;background:rgba(255,93,115,.12);color:#ff97a6;border:1px solid rgba(255,93,115,.3)}
  .msg.ok{display:block;background:rgba(194,249,112,.1);color:var(--lime);border:1px solid rgba(194,249,112,.3)}
  .ovrbar{margin-top:11px;display:none;gap:8px}
  .ovrbar.show{display:flex}
  .ovrbar button{flex:1;padding:11px;border-radius:10px;border:1px solid var(--line);background:#0e0b1a;color:var(--ink);font-family:inherit;font-size:13px;cursor:pointer}
  .ovrbar button.yes{border-color:var(--lime);color:var(--lime)}

  footer{text-align:center;font-family:'Spline Sans Mono',monospace;font-size:10px;color:#4a4366;letter-spacing:1px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Chain<span class="x">song</span></h1>
    <span class="tag" id="turn">Opening move</span>
  </header>

  <!-- History strip: horizontal, compact, doesn't eat vertical space -->
  <div class="history" id="history"></div>

  <!-- The previous song — always visible above the input while playing -->
  <div class="prev empty" id="prev">
    <div class="ptitle">Name any song to start the chain</div>
  </div>

  <div class="panel">
    <div class="row">
      <label>Your song — title</label>
      <input id="title" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="e.g. I Will Always Love You">
    </div>
    <div class="row">
      <label>Artist</label>
      <input id="artist" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="e.g. Whitney Houston">
    </div>
    <div class="row" id="hintRow">
      <label>Describe it (a lyric, the year, the vibe — optional)</label>
      <input id="desc" autocomplete="off" placeholder="helps the table trust you weren't googling">
    </div>

    <div id="linkBlock" style="display:none">
      <label>Which word links to the previous song?</label>
      <div class="words" id="words"></div>
    </div>

    <button class="go" id="go" disabled>Name this song</button>
    <div class="msg" id="msg"></div>
    <div class="ovrbar" id="ovrbar">
      <button id="ovrNo">It was wrong</button>
      <button class="yes" id="ovrYes">Table says it's real — accept</button>
    </div>
  </div>

  <footer>PASS &amp; PLAY · v0.2</footer>
</div>

<script type="module">
// Stop words + stemmer, mirrored from lib/wordlink.js so the client picker
// matches server validation exactly.
const STOP=new Set(["a","an","the","i","me","my","mine","myself","you","your","yours","u","he","him","his","she","her","hers","it","its","we","us","our","ours","they","them","their","theirs","of","to","in","on","at","by","for","with","from","as","is","be","am","are","was","were","been","and","or","but","nor","so","yet","if","then","than","that","this","these","those","up","out","off","over","into","onto","down","no","not","do","does","did","n"]);
function rawTokens(t){if(!t)return[];return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/['’]/g,"").replace(/[^a-z0-9 ]+/g," ").split(/\s+/).filter(Boolean);}
const IRR={children:"child",men:"man",women:"woman",people:"person",feet:"foot",teeth:"tooth",ran:"run",running:"run",runs:"run",loved:"love",loving:"love",loves:"love",rushed:"rush",rushing:"rush",rushes:"rush",always:"always",perhaps:"perhaps",across:"across"};
function stem(w){if(IRR[w])return IRR[w];if(w.length<=3)return w;
 if(w.endsWith("ies")&&w.length>4)return w.slice(0,-3)+"y";
 if(w.endsWith("ied")&&w.length>4)return w.slice(0,-3)+"y";
 if(w.endsWith("es")&&w.length>4&&/(s|x|z|ch|sh)es$/.test(w))return w.slice(0,-2);
 if(w.endsWith("ing")&&w.length>5){let b=w.slice(0,-3);if(/([bdfgklmnprt])\1$/.test(b))b=b.slice(0,-1);return b;}
 if(w.endsWith("ed")&&w.length>4){let b=w.slice(0,-2);if(/([bdfgklmnprt])\1$/.test(b))b=b.slice(0,-1);return b;}
 if(w.endsWith("iest")&&w.length>5)return w.slice(0,-4)+"y";
 if(w.endsWith("ier")&&w.length>4)return w.slice(0,-3)+"y";
 if(w.endsWith("est")&&w.length>5)return w.slice(0,-3);
 if(w.endsWith("er")&&w.length>4)return w.slice(0,-2);
 if(w.endsWith("ly")&&w.length>4)return w.slice(0,-2);
 if(w.endsWith("s")&&!/(ss|us|is|os|as)$/.test(w)&&w.length>3)return w.slice(0,-1);
 return w;}
function linkable(title,artist){const seen=new Set(),out=[];for(const s of[title,artist])for(const tk of rawTokens(s)){if(STOP.has(tk)||tk.length<2)continue;const st=stem(tk);if(STOP.has(st)||seen.has(st))continue;seen.add(st);out.push({display:tk,stem:st});}return out;}

const chain=[];
let forbiddenStem=null;
let selected=null;

const $=id=>document.getElementById(id);
const titleEl=$("title"),artistEl=$("artist"),descEl=$("desc");
const esc=s=>String(s).replace(/[&<>"]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[x]));

// Render both the history strip and the prominent "previous" card. These are
// the two views of the chain: history is the whole timeline, prev is the one
// song you're actively linking to.
function renderChain(){
  const hist=$("history");
  hist.innerHTML=chain.map((m,i)=>`
    <div class="hcard">
      <div class="hseq">#${String(i+1).padStart(2,'0')}${m.linkWord?' · '+esc(m.linkWord):''}</div>
      <div class="htitle">${esc(m.title)}</div>
      <div class="hartist">${esc(m.artist)}</div>
    </div>`).join('');
  hist.scrollLeft=hist.scrollWidth;

  const prev=$("prev");
  if(!chain.length){
    prev.className='prev empty';
    prev.innerHTML='<div class="ptitle">Name any song to start the chain</div>';
    return;
  }
  const last=chain[chain.length-1];
  // Find the display form of the forbidden word to show the player.
  let forbidDisplay=null;
  if(forbiddenStem){
    const w=linkable(last.title,last.artist).find(x=>x.stem===forbiddenStem);
    forbidDisplay=w?w.display:null;
  }
  prev.className='prev';
  prev.innerHTML=`
    <div class="plabel">Link your song to</div>
    <div class="ptitle">${esc(last.title)}</div>
    <div class="partist">${esc(last.artist)}</div>
    ${forbidDisplay?`<div class="pforbid">cannot reuse <b>${esc(forbidDisplay)}</b></div>`:''}
  `;
}

function refreshWords(){
  const isOpening=chain.length===0;
  $("linkBlock").style.display=isOpening?'none':'block';
  $("turn").textContent=isOpening?'Opening move':`Player ${(chain.length%4)+1}'s turn`;
  $("go").textContent=isOpening?'Start the chain':'Name this song';
  if(isOpening){validate();return;}
  const words=linkable(titleEl.value,artistEl.value);
  $("words").innerHTML=words.length?words.map(w=>{
    const dead=forbiddenStem&&w.stem===forbiddenStem;
    const sel=selected&&selected.stem===w.stem;
    return `<span class="w ${dead?'dead':''} ${sel?'sel':''}" data-s="${w.stem}" data-d="${esc(w.display)}">${esc(w.display)}</span>`;
  }).join(''):'<span class="hint">Type your title &amp; artist above, then pick the linking word here.</span>';
  validate();
}
$("words").addEventListener("click",e=>{
  const el=e.target.closest('.w');if(!el||el.classList.contains('dead'))return;
  selected={display:el.dataset.d,stem:el.dataset.s};refreshWords();
});
[titleEl,artistEl].forEach(el=>el.addEventListener("input",()=>{selected=null;refreshWords();}));

function validate(){
  const hasSong=titleEl.value.trim()&&artistEl.value.trim();
  const ok=chain.length===0?hasSong:(hasSong&&selected);
  $("go").disabled=!ok;
}

function showMsg(t,kind){const m=$("msg");m.textContent=t;m.className="msg "+kind;}
function clearMsg(){$("msg").className="msg";$("ovrbar").className="ovrbar";}

async function submit(allowOverride){
  $("go").disabled=true;clearMsg();
  const isOpening=chain.length===0;
  const prev=isOpening?null:chain[chain.length-1];
  const body={
    prev:prev?{title:prev.title,artist:prev.artist}:null,
    next:{title:titleEl.value.trim(),artist:artistEl.value.trim()},
    linkWord:isOpening?'_':selected.display,
    forbiddenStem,allowOverride:!!allowOverride
  };
  let data;
  try{
    const r=await fetch('/api/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    data=await r.json();
  }catch(e){ showMsg('Network error — check connection and try again.','err'); validate(); return; }

  if(!data.accepted){
    const reasons={
      LINK_NOT_IN_PREVIOUS:"That word isn't in the previous song's title or artist.",
      LINK_REUSES_FORBIDDEN_WORD:"You can't reuse the word that linked into the last song.",
      LINK_NOT_IN_NEW_SONG:"That word isn't in the song you just named.",
      SONG_NOT_FOUND:"We couldn't verify that song exists.",
      VERIFY_UNAVAILABLE:"Couldn't reach the music database right now."
    };
    showMsg(reasons[data.reason]||'Move rejected.','err');
    if(data.needsOverride){ $("ovrbar").className="ovrbar show"; }
    validate();return;
  }

  chain.push({
    title:data.canonicalTitle||body.next.title,
    artist:data.canonicalArtist||body.next.artist,
    linkWord:isOpening?null:selected.display,
    linkStem:data.linkStem,override:!!data.override
  });
  forbiddenStem=data.linkStem;
  selected=null;titleEl.value='';artistEl.value='';descEl.value='';
  renderChain();refreshWords();
  showMsg(data.override?'Accepted by table call.':'Linked! Pass the phone.','ok');
  setTimeout(clearMsg,1800);
}

$("go").addEventListener("click",()=>submit(false));
$("ovrYes").addEventListener("click",()=>{$("ovrbar").className="ovrbar";submit(true);});
$("ovrNo").addEventListener("click",()=>{clearMsg();validate();});

renderChain();refreshWords();
</script>
</body>
</html>
